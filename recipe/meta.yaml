{% set name = "pytest-dependency" %}
{% set version = "0.6.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 246c24d2a5fc743a942cec4408853640e56a05ba58d46e5b213a1d4b738a2464

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools_scm
    - setuptools
  run:
    - pytest >=3.6.0
    - python >={{ python_min }}

test:
  imports:
    - pytest_dependency
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/RKrahl/pytest-dependency
  summary: Manage dependencies of tests
  license: Apache-2.0
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - Windiana42
